services:
  db:
    image: mysql:8.0
    container_name: pradeo-db
    restart: always
    environment:
      MYSQL_DATABASE: cve_database
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pradeo-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://user:password@db:3306/cve_database
      - DEBUG=true
      - LOG_LEVEL=INFO

volumes:
  mysql_data:
